name: Daily Stock AI Summary

on:
  schedule:
    - cron: '0 10 * * *' # 每天台灣時間 18:00 執行 (UTC+8)
  workflow_dispatch:      # 讓你可以手動點按鈕測試

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd MyScraper
          dotnet run
