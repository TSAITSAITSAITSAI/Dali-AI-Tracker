jobs:
  run-scraper:
    runs-on: ubuntu-latest
    # 加入這兩行環境變數設定
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd MyScraper
          dotnet run
